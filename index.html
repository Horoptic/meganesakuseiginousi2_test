function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function generateQuizSet() {
  const fourChoices = quizData.filter(q => q.type === "4");
  const twoChoices = quizData.filter(q => q.type === "2");

  shuffleArray(fourChoices);
  shuffleArray(twoChoices);

  selectedQuiz = [...fourChoices.slice(0,25), ...twoChoices.slice(0,25)];
}

function showOverlay(isCorrect) {
  const overlay = document.getElementById("overlay");
  const symbol = document.getElementById("overlay-symbol");

  if (isCorrect) {
    symbol.innerText = "〇";
    symbol.className = "correct";
  } else {
    symbol.innerText = "✕";
    symbol.className = "wrong";
  }

  overlay.classList.add("show");
}

generateQuizSet();

function loadQuestion() {
  updateProgress();

  const q = selectedQuiz[current];
  document.getElementById("question").innerText = q.question;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.answers.forEach((ans, index) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(index);
    answersDiv.appendChild(btn);
  });

  document.getElementById("result").innerText = "";
  document.getElementById("correct-answer").innerText = "";
}

function checkAnswer(index) {
  const q = selectedQuiz[current];
  const result = document.getElementById("result");
  const correctAnswerDiv = document.getElementById("correct-answer");

  const buttons = document.querySelectorAll("#answers button");
  buttons.forEach(btn => btn.disabled = true);

  if (index === q.correct) {
    result.innerText = "正解！";
    score++;
    showOverlay(true);
  } else {
    result.innerText = "不正解…";
    showOverlay(false);
  }

  correctAnswerDiv.innerText = `正解は：${q.answers[q.correct]}`;
}

function nextQuestion() {
  document.getElementById("overlay").classList.remove("show");

  current++;
  if (current < selectedQuiz.length) {
    loadQuestion();
  } else {
    const percentage = (score / 50 * 100).toFixed(1);

    document.querySelector(".quiz-box").innerHTML =
      `<h2>お疲れ様でした！</h2>

       <p style="text-align:center;font-size:1.3em;">
       スコア: ${score} / 50<br>
       正答率: ${percentage}%
       </p>

       <div class="final-signature">by Horoptic</div>

       <div class="notice">
       ※本アプリは個人制作の学習用ツールです。<br>
       内容の正確性は保証されません。
       </div>

       <div class="x-link">
       <a href="https://x.com/horoptic" target="_blank">
       Xはこちら
       </a>
       </div>`;
  }
}

loadQuestion();
</script>
